# =============================================================================
# feature-fuse 参数配置 — 修改后无需重新编译，直接运行即可生效
# 详细文档: PARAMS_GUIDE.md
# =============================================================================

# ═════════════════════════════════════════════════════════════════════════════
# 1. 图片预处理
# ═════════════════════════════════════════════════════════════════════════════
# max_dim: 最长边 Lanczos3 等比缩放（建议 360~1280，默认 720）
max_dim: 512

# ═════════════════════════════════════════════════════════════════════════════
# 2. 局部 Gaussian 残差
# ═════════════════════════════════════════════════════════════════════════════
# gauss_sigma: 模糊 sigma，越大捕获越粗的局部变化（建议 5~80，默认 35）
gauss_sigma: 12.0

# ═════════════════════════════════════════════════════════════════════════════
# 3. Percentile 归一化（所有特征图共用，消除离群值影响）
# ═════════════════════════════════════════════════════════════════════════════
percentile:
  low: 1.0
  high: 99.0

# ═════════════════════════════════════════════════════════════════════════════
# 4. 全局残差基准值（稳健中心估计: 压缩→截断→trimmed_mean+median 混合→残差）
#    compression: gamma | log; trim: 截断百分位; weight: 混合系数
# ═════════════════════════════════════════════════════════════════════════════
global_residual:
  light:
    compression: gamma
    trim_low: 0.0
    trim_high: 95.0
    trimmed_mean_weight: 0.7
    median_weight: 0.3
    gamma_power: 1
  lab_a:
    compression: gamma
    trim_low: 2.0
    trim_high: 98.0
    trimmed_mean_weight: 0.65
    median_weight: 0.35
    gamma_power: 1
  lab_b:
    compression: gamma
    trim_low: 2.0
    trim_high: 98.0
    trimmed_mean_weight: 0.65
    median_weight: 0.35
    gamma_power: 1
  sat:
    compression: gamma
    trim_low: 2.0
    trim_high: 98.0
    trimmed_mean_weight: 0.65
    median_weight: 0.35
    gamma_power: 1

# ═════════════════════════════════════════════════════════════════════════════
# 4a. 饱和度后处理 — 局部饱和度残差的 post-gamma 压缩
#     <1 抬升低值（更多微弱色彩变化被响应），>1 压制低值（只有高差异幸存）
# ═════════════════════════════════════════════════════════════════════════════
saturation:
  local_post_gamma: 1.0

# ═════════════════════════════════════════════════════════════════════════════
# 4b. 背景估计（三阶段: Median Cut 色域切分 → BFS 连通+形态学 → 软 mask）
#     partition:    色域切分与背景簇评分
#     morphology:   闭→开→腐蚀，填充孔洞、去除噪声
#     flood_barrier: BFS 前景结构阻断，防背景 flood 吞掉主体细节
#     soft_mask:    边界原型色高斯距离软似然 + 前景置信度
# ═════════════════════════════════════════════════════════════════════════════
background:
  partition:
    enabled: true
    max_depth: 8
    max_clusters: 8
    variance_threshold: 0.11
    min_cluster_area_ratio: 0.01
    border_band: 12
    bg_score_threshold: 0.55
    bg_connect_threshold: 0.10
    max_bg_ratio: 0.88
  morphology:
    open_radius: 2
    close_radius: 8
    erode_radius: 2
  flood_barrier:
    enabled: true
    grad_stop: 0.51
    dct_stop: 0.45
    local_light_stop: 0.40
    spectral_stop: 0.50
    color_threshold: 0.35
    barrier_color_relax_threshold: 0.92
    protect_strength: 0.75
    protect_p_low: 70.0
    protect_p_high: 99.0
    protect_grad_weight: 0.30
    protect_dct_weight: 0.25
    protect_spectral_weight: 0.15
    protect_local_light_weight: 0.15
    protect_local_sat_weight: 0.15
  soft_mask:
    border_bg_blur_radius: 1
    fg_confidence_blur_radius: 1
    fg_confidence_sharpen_amount: 0.40
    fg_confidence_sharpen_radius: 1

# ═════════════════════════════════════════════════════════════════════════════
# 4c. Subject Prior — 2D 高斯中心偏向: exp(-(dx²+dy²))
#     radius=0 → 特征退化（仅中心像素有值），等效禁用
# ═════════════════════════════════════════════════════════════════════════════
subject_prior:
  center_x: 0.5
  center_y: 0.55
  radius_x: 0.0
  radius_y: 0.0

# ═════════════════════════════════════════════════════════════════════════════
# 4d. Segment-aware Region Priors（color-segment 色块分割 → 区域评分 → 下游修正）
#     ① segment:        Union-Find 区域生长（color_weight=edge 敏感度, edge_weight=轮廓尊重度）
#     ② region_scoring: 每区域计算 saliency / bg_probability / subject_confidence
#     ③ dynamic_weights: 特征权重按区域分离度+显著度相关性+前背景分离度动态调整
# ═════════════════════════════════════════════════════════════════════════════
segment_fusion:
  enabled: true
  background_bias: balanced   # balanced / subject / background
  diagnostics: true
  segment:
    min_region_area: 70
    min_cluster_area_ratio: 0.002
    edge_threshold: 0.0005
    edge_split_strength: 0.25
    edge_gamma: 0.6
    edge_merge_strength: 0.12
    color_merge_distance: 8.0
    small_region_color_distance: 20.0
    merge_small_regions: true
    morph_open_radius: 0
    morph_close_radius: 1
    color_weight: 0.8
    edge_weight: 2.5
  region_scoring:
    border_band: 8
    saliency_dct_weight: 0.20
    saliency_lab_grad_weight: 0.22
    saliency_spectral_weight: 0.28
    saliency_local_light_weight: 0.15
    saliency_local_sat_weight: 0.15
    bg_border_weight: 0.26
    bg_color_weight: 0.32
    bg_low_saliency_weight: 0.18
    bg_low_center_weight: 0.16
    bg_low_edge_weight: 0.08
    subject_center_weight: 0.35
    subject_saliency_weight: 0.45
    subject_edge_weight: 0.20
    subject_protect_strength: 0.55
    # 设为 0 时 segment 不直接改写传统背景图，而是通过第 19D segment_foreground 参与融合。
    background_correction_strength: 0.00
    # region color 现在用下列组件加权选 Top-1，而不是面积 × 显著度硬连乘。
    area_power: 0.55
    region_area_weight: 0.18
    region_subject_weight: 0.28
    region_saliency_mean_weight: 0.18
    region_saliency_peak_weight: 0.20
    region_foreground_weight: 0.20
    region_center_weight: 0.08
    region_saturation_weight: 0.12
    color_stability_weight: 0.30
    bg_probability_penalty_strength: 0.45
    # 大面积、低方差、低饱和区域更像平铺背景，会被压低 region color 排名。
    bg_flat_penalty_strength: 0.55
    bg_flat_area_min_ratio: 0.08
    bg_flat_area_full_ratio: 0.35
    bg_flat_sat_threshold: 0.28
    # 对“主体置信度 × 区域显著度”高的区域给轻微奖励，帮助第三色块选到主体最突出部分。
    subject_prominence_bonus_strength: 0.20
    min_region_area_ratio: 0.0015
    # 大面积但高饱和、色相接近红/绿的色块更可能是有效主色，给轻微奖励。
    vivid_rg_bonus_strength: 0.12
    vivid_rg_sat_threshold: 0.45
    vivid_rg_hue_width: 38.0
  dynamic_weights:
    enabled: true
    pixel_stat_weight: 0.65
    region_score_weight: 0.35
    separation_weight: 0.45
    saliency_corr_weight: 0.35
    bg_suppression_weight: 0.20

# ═════════════════════════════════════════════════════════════════════════════
# 5. 特征权重 — 19 维，两套独立（add 加法 / mul 软乘法），自动归一化
#    权重设为 0 → 该特征不参与融合
#    segment_foreground: color-segment 派生前景概率，1=区域更像主体/非背景
# ═════════════════════════════════════════════════════════════════════════════
weights_add:
  dct: 0.1
  lab_grad: 0.02
  spectral: 0.15
  global_light: 0.00
  global_lab_a: 0.09
  global_lab_b: 0.08
  global_sat: 0.01
  local_light: 0.00
  local_lab_a: 0.03
  local_lab_b: 0.02
  local_sat: 0.01
  background_mask_morph: 0.00
  background_fg_confidence: 0.00
  subject_prior: 0.00
  abs_light: 0.00
  abs_lab_a: 0.035
  abs_lab_b: 0.03
  abs_sat: 0.10
  segment_foreground: 0.50

weights_mul:
  dct: 0.01
  lab_grad: 0.00
  spectral: 0.12
  global_light: 0.03
  global_lab_a: 0.13
  global_lab_b: 0.13
  global_sat: 0.00
  local_light: 0.07
  local_lab_a: 0.015
  local_lab_b: 0.01
  local_sat: 0.00
  background_mask_morph: 0.00
  background_fg_confidence: 0.17
  subject_prior: 0.00
  abs_light: 0.00
  abs_lab_a: 0.06
  abs_lab_b: 0.02
  abs_sat: 0.10
  segment_foreground: 0.70

# ═════════════════════════════════════════════════════════════════════════════
# 6. Hybrid Fusion — hybrid = α×add + (1-α)×softmul, result = hybrid^γ
#    alpha: 0=纯乘法(严格), 1=纯加法(慷慨)
#    gamma: <1 提亮, =1 无变化, >1 压暗增强对比
#    epsilon: 乘法 baseline，防零值归零
# ═════════════════════════════════════════════════════════════════════════════
fusion:
  alpha: 0.10
  gamma: 2.5
  epsilon: 0.10

# ═════════════════════════════════════════════════════════════════════════════
# 6a. Direct Blend — hybrid × 原图 + 加权聚类预测色
#     normalize_before: 是否先对 hybrid 做 min-max 归一化
# ═════════════════════════════════════════════════════════════════════════════
direct_blend:
  normalize_before: true

# ═════════════════════════════════════════════════════════════════════════════
# 6b. Impression Background — 颜色聚类专用的背景氛围回流
#     只影响 weighted cluster / impression color，不改写背景图和 Fuse 图。
# ═════════════════════════════════════════════════════════════════════════════
impression_background:
  enabled: true
  # 背景 ambient 通道整体强度。调大→大面积背景更能影响最终主色。
  strength: 0.10
  # 相似背景色块的有效累计面积达到 min 后开始回流，达到 full 后面积权重为 1。
  min_area_ratio: 0.26
  full_area_ratio: 0.85
  # 低于该饱和度的背景回流会被压低，避免灰/白/黑铺底过度代表主色。
  min_saturation: 0.08
  colorfulness_weight: 0.65
  tone_harmony_weight: 0.25
  stability_weight: 0.01
  # 单像素 ambient 权重上限，避免背景覆盖主体权重。
  max_weight: 0.30
  # 黑/白/灰大背景的最终聚类权重惩罚。只影响 color_cluster_weight_final。
  neutral_suppression_enabled: true
  neutral_suppression_strength: 0.95
  neutral_sat_threshold: 0.12
  neutral_black_l_threshold: 18.0
  neutral_white_l_threshold: 85.0
  neutral_light_softness: 10.0
  neutral_bg_probability_threshold: 0.45
  neutral_min_effective_area_ratio: 0.05
  neutral_full_effective_area_ratio: 0.25

# ═════════════════════════════════════════════════════════════════════════════
# 7. 最终过滤（threshold / quantile 互斥）
# ═════════════════════════════════════════════════════════════════════════════
filter:
  method: threshold
  threshold: 0.10
  normalize_before: true
  # 阈值/分位数过滤后，只对保留下来的正值区域重新归一化；0 背景保持为 0。
  post_normalize: true
  # post_normalize 输出下限：0 表示拉到 [0,1]，0.2 表示保留区域拉到 [0.2,1]。
  post_normalize_min: 0.0
  # 归一化后的 gamma 曲线：<1 放大弱响应，>1 压低弱响应，1 不改变。
  post_normalize_gamma: 1.2

# ═════════════════════════════════════════════════════════════════════════════
# 8. Contact Sheet 排版（仅影响输出，不影响计算）
# ═════════════════════════════════════════════════════════════════════════════
contact_sheet:
  cols: 10
  rows: 5
  pad: 4
  thumb_w: 240
  label_h: 16

# ═════════════════════════════════════════════════════════════════════════════
# 9. DCT 纹理复杂度 — 8×8 滑动窗口高频比率判定
#     high_freq_threshold: u+v≥T 的对角线阈值（建议 2~8，默认 3—42/63 AC 系数）
# ═════════════════════════════════════════════════════════════════════════════
dct:
  high_freq_threshold: 3

# ═════════════════════════════════════════════════════════════════════════════
# 10. 频谱残差显著性 — R = ln|F| − avg_filter(ln|F|)
#     mean_filter_kernel: 谱均值滤波核（建议 1~15，默认 3）
#     gaussian_sigma:     重构后 blur（建议 0~10，默认 3）
#     gamma:              FFT 前 L* gamma 校正（<1 提亮暗部）
#     post_gamma:         最终显著图 gamma（<1 慷慨，>1 严格）
# ═════════════════════════════════════════════════════════════════════════════
spectral_residual:
  mean_filter_kernel: 10
  gaussian_sigma: 1.0
  gamma: 0.81
  post_gamma: 0.9

# ═════════════════════════════════════════════════════════════════════════════
# 11. 印象色聚类 — 加权 K-Means++
#     sample_method: stride(间隔采样) | all(全像素)
# ═════════════════════════════════════════════════════════════════════════════
impression:
  k: 8
  max_iter: 10
  sample_method: stride
  sample_stride: 2
  seed: 42
  # 簇级胜出评分：K-Means 仍负责按 RGB 分色，这里只决定最终选哪个簇。
  # area_power < 1 会压缩面积优势，避免白底/黑底/大面积浅色残留凭总权重胜出。
  cluster_scoring:
    enabled: true
    area_power: 0.65
    mean_weight_power: 1.0
    peak_weight_power: 0.80
    area_weight: 0.45
    mean_weight_weight: 0.75
    peak_weight_weight: 0.20
    saturation_bonus: 0.25
    neutral_penalty_strength: 0.75
    neutral_sat_threshold: 0.16
    neutral_min_area_ratio: 0.08
    neutral_full_area_ratio: 0.35
    background_penalty_strength: 0.35
    min_cluster_area_ratio: 0.002
    # 肤色惩罚：动漫角色肤色常大面积+高权重，容易胜出成为"印象色"，
    # 但这通常不是用户想要的主题色。增大此值使肤色簇更难胜出。
    skin_penalty_strength: 0.6   # [0, 1], 0=禁用

# ═════════════════════════════════════════════════════════════════════════════
# 12. 动态特征权重 — 按特征自身统计量（方差/范围/峰度）动态调整 multiplier
#     multiplier 范围 [min_multiplier, max_multiplier]
#     per_feature: 结构性先验（bg_*/subject_prior）默认关闭，其余开启
# ═════════════════════════════════════════════════════════════════════════════
dynamic_weights:
  enabled: true
  min_multiplier: 0.35
  max_multiplier: 1.85
  variance_ref: 0.05
  range_ref: 0.65
  peakiness_ref: 4.0
  eps: 1.0e-6
  stat_mix:
    variance: 0.55
    range: 0.25
    peakiness: 0.20
  percentile:
    low: 2.0
    high: 98.0
  per_feature:
    dct:
      enabled: true
    lab_grad:
      enabled: true
    spectral:
      enabled: true
    global_light:
      enabled: true
    global_lab_a:
      enabled: true
    global_lab_b:
      enabled: true
    global_sat:
      enabled: true
    local_light:
      enabled: true
    local_lab_a:
      enabled: true
    local_lab_b:
      enabled: true
    local_sat:
      enabled: true
    background_mask_morph:
      enabled: false
    background_fg_confidence:
      enabled: false
    subject_prior:
      enabled: false
    abs_light:
      enabled: true
    abs_lab_a:
      enabled: true
    abs_lab_b:
      enabled: true
    abs_sat:
      enabled: true
    segment_foreground:
      enabled: false  # 背景相关不加动态权重
