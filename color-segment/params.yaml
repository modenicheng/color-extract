# color-segment default parameters
# Edit this file to tune segmentation without recompiling
preprocess_max_dim: 512
max_clusters: 32
max_depth: 8
variance_threshold: 1.0
min_cluster_area_ratio: 0.001
min_region_area: 50
edge_threshold: 0.05
edge_split_strength: 8
edge_gamma: 0.4
enable_edge_split: false
edge_merge_strength: 0.05
color_merge_distance: 6.0
small_region_color_distance: 12.0
color_space: Lab
merge_small_regions: true
smooth_boundaries: true
smooth_radius: 1
