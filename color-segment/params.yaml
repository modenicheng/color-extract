# =============================================================================
# color-segment 分割参数配置
# =============================================================================
#
# 流水线：特征提取 → LAB Sobel 边缘检测 → Union-Find 区域生长 → 邻接图合并
# 编辑此文件即可调参，无需重新编译。所有字段均有默认值，只需覆盖要调整的项。
#
# 调试开关：设置环境变量 COLOR_SEGMENT_PROFILE=1 可输出各阶段耗时分解。
#
# =============================================================================
# 快速调参指南
# =============================================================================
#
# ┌─────────────────────┬──────┬──────────────────────────────────────────────┐
# │ 想要的效果           │ 方向 │ 建议值                                       │
# ├─────────────────────┼──────┼──────────────────────────────────────────────┤
# │ 更多更细的区域       │ ↓    │ edge_threshold: 0.03, color_merge_distance: 4│
# │                     │      │ edge_split_strength: 0.4                      │
# │ 更少更大的色块       │ ↑    │ edge_threshold: 0.15, color_merge_distance: 12│
# │                     │      │ min_region_area: 200                          │
# │ 减少碎片噪声         │ ↑    │ min_region_area: 100~300                     │
# │                     │      │ small_region_color_distance: 20               │
# │ 保留细节笔触         │ ↓    │ edge_threshold: 0.03, edge_gamma: 0.3        │
# │                     │      │ min_region_area: 20                           │
# │ 色块边界更清晰       │ ↓    │ edge_gamma: 0.35, edge_merge_strength: 0.02  │
# │ 减弱抗锯齿/渐变干扰  │ ↑    │ edge_threshold: 0.12, edge_gamma: 0.7        │
# │ 线稿图(强边缘)       │ ↑    │ edge_split_strength: 0.5~0.8                 │
# │ 厚涂/照片(弱边缘)    │ ↓    │ edge_split_strength: 0.25~0.4                │
# └─────────────────────┴──────┴──────────────────────────────────────────────┘
#
# =============================================================================
# 参数详解
# =============================================================================

# ---------------------------------------------------------------------------
# preprocess_max_dim — 预处理最大边长
# ---------------------------------------------------------------------------
# 输入图像缩放后宽高均不超过此值，小图保持原尺寸。
# 值越大分割越精细但计算量 O(w·h) 增长。
# 范围: 256~2048，推荐: 512（1024 以上显著变慢）
preprocess_max_dim: 512

# ---------------------------------------------------------------------------
# min_region_area — 最小区域像素数
# ---------------------------------------------------------------------------
# 面积小于此值的区域被视为"碎片"，在合并阶段被吸收到最合适的邻接区域。
# 512×512 图有 ~262k 像素，50 像素约占总面积 0.02%。
#   20~50   保留细节色块，适合精细分析
#   100~300  中等，过滤抗锯齿/压缩产生的小碎片
#   500+    激进，只保留大面积平涂色块
min_region_area: 90

# ---------------------------------------------------------------------------
# min_cluster_area_ratio — 最小区域面积比
# ---------------------------------------------------------------------------
# 相对面积阈值，实际 min_area = max(min_region_area, total_pixels × 此值)。
# 防止小图上碎片过多。512×512 时 0.001 ≈ 262 像素。
# 范围: 0.0005~0.01
min_cluster_area_ratio: 0.001

# ---------------------------------------------------------------------------
# edge_threshold — 边缘检测灵敏度
# ---------------------------------------------------------------------------
# 控制"什么才算边缘"。像素 Sobel 梯度 ≤ cutoff 时 edge=0（完全忽略）。
# cutoff = edge_threshold × max_gradient（下限 1.0）。
#   0.02~0.05  非常敏感，轻微笔触/渐变都被检测 → 区域多、碎片多
#   0.08~0.15  适中，只保留明确色块边界
#   0.20~0.50  迟钝，只有极高对比边界才保留 → 区域少、易欠分割
# 当前 0.05 偏敏感，适合线稿清晰的动漫图。
edge_threshold: 0.03

# ---------------------------------------------------------------------------
# edge_split_strength — 边缘壁垒强度
# ---------------------------------------------------------------------------
# 两处作用：
#   1. 区域生长：edge_wall = clamp(此值 × 0.68, 0.45, 0.85)
#      像素间边缘强度 ≥ edge_wall → 阻断生长，形成区域边界
#   2. 区域合并：split_guard = clamp(此值, 0.25, 0.98)
#      防止跨强边缘合并的安全上限
#   0.25~0.40  低壁垒，弱边缘就阻断 → 更多更小的区域
#   0.40~0.60  中等，典型动漫线稿的合适范围
#   0.60~0.98  高壁垒，仅极强边缘阻断 → 区域少而大
# 注意：由于 clamp 的存在，0.6 以上的值效果相同（已饱和到上限）。
edge_split_strength: 0.3

# ---------------------------------------------------------------------------
# edge_gamma — 边缘强度 gamma 压缩
# ---------------------------------------------------------------------------
# edge_out = edge_in ^ gamma
# gamma < 1 时抬高中等边缘，使线稿内部笔触和色块边界都更"硬"。
#   0.3~0.5  强压缩，中等边缘被显著抬高，抗锯齿边缘也被强化
#   0.6~0.8  弱压缩，边缘强度更线性
#   1.0      无压缩，直接使用原始梯度归一化值
edge_gamma: 0.4

# ---------------------------------------------------------------------------
# edge_merge_strength — 弱边缘合并阈值
# ---------------------------------------------------------------------------
# 两个相邻区域的共享边界平均边缘强度若 ≤ 此值，视为量化伪影，直接合并。
#   0.02~0.05  保守，仅合并几乎无边缘的相邻区域（区域较多）
#   0.05~0.12  适中，能吸收大部分量化碎片
#   0.15+      激进，会合并真正的弱色块边界
edge_merge_strength: 0.06

# ---------------------------------------------------------------------------
# color_merge_distance — 颜色合并阈值
# ---------------------------------------------------------------------------
# 控制"什么颜色算同一种"的核心参数。同时影响区域生长和区域合并：
#   - 生长阶段：local_limit = clamp(此值 × 1.75 + 4, 12, 30) RGB距离平方
#   - 合并阶段：merge_limit = clamp(此值 × 1.9 + 5, 14, 32) RGB距离
#   4~6    严格，只有非常接近的颜色才合并 → 区域多、调色盘丰富
#   6~10   适中
#   12~16  宽松，相近色块大量合并 → 区域少、调色盘简约
color_merge_distance: 2.5

# ---------------------------------------------------------------------------
# small_region_color_distance — 小区域吸收颜色容差
# ---------------------------------------------------------------------------
# 小碎片被吸收到邻接区域时，两者的平均 RGB 距离必须 ≤ 此值。
# 值越小越保守——颜色差异大的小碎片会被保留而非错误吸收。
#   8~12   严格，只允许颜色非常接近的吸收
#   16~24  适中
#   30+    宽松，几乎所有小碎片都会被吸收
small_region_color_distance: 24.0

# ---------------------------------------------------------------------------
# merge_small_regions — 是否吸收小区域
# ---------------------------------------------------------------------------
# true:  面积 < min_region_area 的区域自动吸收到最合适的邻接区域
# false: 保留所有区域（用于调试或查看原始生长结果）
merge_small_regions: true
# Morphological edge-map refinement (0 = disabled, 1 = 3×3, 2 = two-pass, etc.)
#   Opening (erode→dilate): removes isolated edge noise (texture/anti-aliasing artifacts)
#   Closing (dilate→erode): bridges broken edge segments (line-art gaps between color regions)
morph_open_radius: 0
morph_close_radius: 1
