# =============================================================================
# impression-color-extract 参数配置
# 修改后无需重新编译，直接运行即可生效
# =============================================================================

# ═════════════════════════════════════════════════════════════════════════════
# 1. 图片预处理
# ═════════════════════════════════════════════════════════════════════════════
max_dim: 720

# ═════════════════════════════════════════════════════════════════════════════
# 2. 局部 Gaussian 残差参数
# ═════════════════════════════════════════════════════════════════════════════
gauss_sigma: 50.0

# ═════════════════════════════════════════════════════════════════════════════
# 3. Percentile 归一化
# ═════════════════════════════════════════════════════════════════════════════
percentile:
  low: 1.0
  high: 99.0

# ═════════════════════════════════════════════════════════════════════════════
# 4. 色域切分 (Median Cut) — 用于背景/主体分离
# ═════════════════════════════════════════════════════════════════════════════
color_partition:
  enabled: true
  max_clusters: 16
  max_depth: 5
  target_samples: 20000
  variance_threshold: 0.01
  min_cluster_area_ratio: 0.005
  border_band: 12
  bg_score_threshold: 0.50
  bg_connect_threshold: 0.08
  max_bg_ratio: 0.85
  open_radius: 2
  close_radius: 2
  erode_radius: 1

# ═════════════════════════════════════════════════════════════════════════════
# 5. 特征融合权重
# ═════════════════════════════════════════════════════════════════════════════
feature_weights:
  dct:             0.15
  lab_grad:        0.20
  spectral:        0.10
  local_light:     0.06
  local_sat:       0.06
  bg_mask:         0.25
  fg_confidence:   0.30

# ═════════════════════════════════════════════════════════════════════════════
# 6. 调色板提取参数
# ═════════════════════════════════════════════════════════════════════════════
palette:
  algorithm: kmeanspp    # kmeanspp | minibatch | mediancut | octree
  n_colors: 1
  min_fg_ratio: 0.05

# ═════════════════════════════════════════════════════════════════════════════
# 7. 输出
# ═════════════════════════════════════════════════════════════════════════════
output:
  dir: output/impression-color-extract
  contact_sheet_cols: 4
  contact_sheet_thumb_w: 240
